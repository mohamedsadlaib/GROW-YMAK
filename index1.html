<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GROW YMAK | المتجر الرسمي</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap');
    :root{--primary:#6366f1;--secondary:#8b5cf6;--accent:#3b82f6;--green:#22c55e;--bg:#070a13;--text:#f1f5f9;--muted:#94a3b8}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden;padding-bottom:80px}
    #loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s,visibility 0.6s}
    #loader.hide{opacity:0;visibility:hidden;pointer-events:none}
    #loader .logo-lg{width:90px;height:90px;margin-bottom:24px;animation:lp 2s infinite}
    @keyframes lp{0%,100%{filter:drop-shadow(0 0 15px rgba(99,102,241,0.3))}50%{filter:drop-shadow(0 0 40px rgba(99,102,241,0.6))}}
    #loader .lbw{width:200px;height:4px;border-radius:4px;background:rgba(255,255,255,0.08);overflow:hidden}
    #loader .lbf{height:100%;width:0%;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--secondary));animation:lbf 2.5s forwards}
    @keyframes lbf{0%{width:0%}100%{width:100%}}
    #loader .lt{color:var(--muted);font-size:14px;margin-top:16px;font-weight:500;letter-spacing:1px}
    #st{position:fixed;top:24px;left:24px;z-index:100;width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.3s;font-size:20px;backdrop-filter:blur(12px)}
    #st:hover{background:rgba(255,255,255,0.1);transform:scale(1.05)}
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden}
    .bg span{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.1;animation:fl 25s infinite}
    .bg span:nth-child(1){width:700px;height:700px;background:var(--primary);top:-15%;left:-15%}
    .bg span:nth-child(2){width:550px;height:550px;background:var(--secondary);bottom:-20%;right:-15%;animation-delay:-8s}
    @keyframes fl{0%,100%{transform:translate(0,0)scale(1)}50%{transform:translate(40px,-40px)scale(1.05)}}
    .grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);background-size:50px 50px}
    header{position:sticky;top:0;z-index:90;background:rgba(7,10,19,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.04);padding:14px 40px;display:flex;justify-content:space-between;align-items:center}
    .ls{display:flex;align-items:center;gap:10px}
    .ls svg{width:36px;height:36px}
    .ls span{font-size:17px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-links{display:flex;gap:8px}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600;padding:8px 16px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);transition:0.3s}
    .nav-links a:hover{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.2);color:#fff}
    .cb{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:0.3s;position:relative}
    .cb:hover{background:rgba(255,255,255,0.1)}
    .cb .bd{background:var(--primary);color:#fff;font-size:12px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .ct{max-width:1100px;margin:40px auto;padding:0 20px;position:relative;z-index:1}
    .shop-h{text-align:center;margin-bottom:40px}
    .shop-h h1{font-size:34px;font-weight:900;margin-bottom:8px}
    .shop-h h1 span{background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .shop-h p{color:var(--muted);font-size:16px}
    .currency-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.15);padding:8px 20px;border-radius:30px;margin-bottom:32px;font-size:14px;font-weight:600;color:#818cf8}
    .pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
    .pc{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.04);border-radius:20px;padding:24px;display:flex;flex-direction:column;transition:all 0.4s cubic-bezier(0.25,1,0.5,1);position:relative;overflow:hidden}
    .pc:hover{transform:translateY(-8px);border-color:rgba(99,102,241,0.2);box-shadow:0 20px 40px rgba(0,0,0,0.4)}
    .pc .pi{height:150px;background:rgba(255,255,255,0.02);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:18px;border:1px solid rgba(255,255,255,0.03);transition:0.4s}
    .pc:hover .pi{transform:scale(1.05) rotate(2deg)}
    .pc .pn{font-size:18px;font-weight:800;margin-bottom:6px}
    .pc .pd{font-size:13px;color:var(--muted);line-height:1.6;flex-grow:1;margin-bottom:16px}
    .pc .pf{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .pc .pp{font-size:18px;font-weight:900;color:#facc15}
    .pc .pp span{font-size:12px;color:var(--muted);font-weight:400}
    .ad-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:10px;padding:10px 16px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:0.3s;font-family:inherit}
    .ad-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(99,102,241,0.3)}
    .dr{position:fixed;top:0;left:-420px;width:400px;height:100%;background:rgba(7,10,19,0.97);backdrop-filter:blur(30px);border-right:1px solid rgba(255,255,255,0.06);z-index:200;box-shadow:25px 0 50px rgba(0,0,0,0.5);display:flex;flex-direction:column;transition:all 0.4s cubic-bezier(0.25,1,0.5,1);padding:36px 24px}
    .dr.open{left:0}
    .dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
    .dh h2{font-size:22px;font-weight:800}
    .cx{font-size:22px;cursor:pointer;background:none;border:none;color:var(--text);transition:0.3s}
    .cx:hover{color:var(--primary)}
    .ditems{flex-grow:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;margin-bottom:20px}
    .dit{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,0.05)}
    .dit .di{font-size:22px}
    .dit .dinf{flex-grow:1}
    .dit .dn{font-size:14px;font-weight:700}
    .dit .dp{font-size:13px;color:#facc15}
    .dit .dct{display:flex;align-items:center;gap:8px}
    .dit .dct button{width:24px;height:24px;border-radius:6px;border:none;background:rgba(255,255,255,0.08);color:var(--text);cursor:pointer}
    .dit .dct button:hover{background:var(--primary)}
    .df{border-top:1px solid rgba(255,255,255,0.06);padding-top:18px}
    .dt{display:flex;justify-content:space-between;font-size:18px;font-weight:800;margin-bottom:18px}
    .chk-btn{width:100%;padding:16px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:0.3s}
    .chk-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(34,197,94,0.3)}
    .mo{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:0.4s}
    .mo.open{opacity:1;visibility:visible}
    .mm{background:rgba(7,10,19,0.97);border:1px solid rgba(255,255,255,0.06);border-radius:28px;padding:40px;max-width:460px;width:100%;position:relative}
    .mt{font-size:22px;font-weight:800;margin-bottom:22px;text-align:center}
    .fg{margin-bottom:16px}
    .fg label{display:block;font-size:14px;font-weight:600;color:#cbd5e1;margin-bottom:6px}
    .fg label .rq{color:#f87171}
    .fg input,.fg select{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;font-size:15px;color:var(--text);outline:none;transition:0.3s;font-family:inherit}
    .fg input:focus,.fg select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.12)}
    .fg input.err{border-color:#ef4444}
    .suc{width:80px;height:80px;border-radius:50%;margin:0 auto 22px;background:linear-gradient(135deg,var(--green),#16a34a);display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;box-shadow:0 8px 45px rgba(34,197,94,0.35)}
    @media(max-width:768px){
      header{padding:12px 16px;}
      .nav-links{gap:4px}
      .nav-links a{font-size:12px;padding:6px 10px}
      .ls span{font-size:14px}
      .dr{width:100%}
      .mm{padding:24px;margin:16px}
    }
    @media(max-width:480px){
      .nav-links a{font-size:11px;padding:5px 8px}
      .ls svg{width:28px;height:28px}
      .cb span:first-child{display:none}
    }
  </style>
</head>
<body>
<div id="loader">
  <svg class="logo-lg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="100" y2="100"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
    <circle cx="50" cy="50" r="42" fill="url(#lg)" opacity="0.1" stroke="url(#lg)" stroke-width="2"/>
    <text x="50" y="58" text-anchor="middle" fill="url(#lg)" font-size="38" font-weight="900" font-family="Arial">$</text>
    <polygon points="50,10 53,18 47,18" fill="#22c55e" opacity="0.5"/>
  </svg>
  <div class="lbw"><div class="lbf"></div></div><div class="lt">GROW YMAK</div>
</div>
<div id="st" onclick="ts()">🔊</div>
<div class="bg"><span></span><span></span></div>
<div class="grid"></div>
<header>
  <div class="ls">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="url(#lg)" opacity="0.15" stroke="url(#lg)" stroke-width="1.5"/><text x="50" y="58" text-anchor="middle" fill="url(#lg)" font-size="34" font-weight="900" font-family="Arial">$</text></svg>
    <span>GROW YMAK</span>
  </div>
  <div class="nav-links">
    <a href="/GROW-YMAK/">الرئيسية</a>
    <a href="/GROW-YMAK/SHOP">المتجر</a>
    <a href="/GROW-YMAK/JOIN">الانضمام</a>
    <a href="https://discord.gg/AUFHMAwnwM" target="_blank">الديسكورد</a>
  </div>
  <div class="cb" onclick="oc()"><span>السلة</span><span class="bd" id="cartC">0</span></div>
</header>
<div class="ct">
  <div class="shop-h">
    <h1>المتجر الرسمي لـ <span>GROW YMAK</span></h1>
    <p>احصل على الرتب المميزة بأفضل الأسعار لدعم السيرفر</p>
  </div>
  <div style="text-align:center"><div class="currency-badge">💰 العملة الرسمية: Flous</div></div>
  <div class="pg" id="products"></div>
</div>

<div class="dr" id="drw">
  <div class="dh"><h2>سلة المشتريات</h2><button class="cx" onclick="cc()">✕</button></div>
  <div class="ditems" id="ditems"></div>
  <div class="df">
    <div class="dt"><span>المجموع:</span><span id="total">0 Flous</span></div>
    <button class="chk-btn" onclick="ocm()">إتمام الطلب</button>
  </div>
</div>

<div class="mo" id="mo">
  <div class="mm" id="mm">
    <button class="cx" style="position:absolute;top:20px;left:20px" onclick="cm()">✕</button>
    <div class="mt">تأكيد الطلب</div>
    <div class="fg">
      <label>اسم اللاعب <span class="rq">*</span></label>
      <input type="text" id="fName" placeholder="أدخل اسمك" maxlength="32">
    </div>
    <div class="fg">
      <label>الديسكورد <span class="rq">*</span></label>
      <input type="text" id="fDisc" placeholder="user#0000" maxlength="64">
    </div>
    <div class="fg">
      <label>طريقة الدفع <span class="rq">*</span></label>
      <select id="fPay">
        <option value="تحويل مباشر في السيرفر">تحويل مباشر في السيرفر</option>
        <option value="دفع عبر العملات">دفع عبر العملات</option>
        <option value="تذكرة تواصل مع الإدارة">تذكرة تواصل مع الإدارة</option>
      </select>
    </div>
    <button class="chk-btn" id="coBtn" onclick="so()">تأكيد وإرسال الطلب</button>
  </div>
</div>

<script>
const WH = ['https://discord.com','/api/webhooks','/ID','/TOKEN'].join(''); // ضع رابط Webhook هنا
const INV = 'https://discord.gg/AUFHMAwnwM';
const PRODS = [
  {id:1,name:'رتبة Bronze',desc:'الرتبة الأساسية لمتجرنا، تمنحك ألواناً مميزة في السيرفر',price:5,icon:'🥉',color:'#cd7f32'},
  {id:2,name:'رتبة Silver',desc:'رتبة فضية بمميزات إضافية ورومات خاصة',price:15,icon:'🥈',color:'#c0c0c0'},
  {id:3,name:'رتبة Gold',desc:'الرتبة الذهبية الفاخرة مع صلاحيات متقدمة',price:30,icon:'🥇',color:'#ffd700'},
  {id:4,name:'رتبة Diamond',desc:'رتبة الماس الحصرية مع أدوات إدارية وشات خاص',price:50,icon:'💎',color:'#b9f2ff'},
  {id:5,name:'رتبة VIP',desc:'أقوى رتبة في السيرفر! جميع المميزات + دخول فوري',price:100,icon:'👑',color:'#ff6b6b'}
];
let cart = [];
const AC = window.AudioContext||window.webkitAudioContext;
let ax = null, se = true, VOL = 0.07;
function ia(){if(!ax) ax = new AC()}
function pt(f,d,t='sine',v=VOL){
  if(!se)return;
  try{ia();const o=ax.createOscillator(),g=ax.createGain();o.connect(g);g.connect(ax.destination);o.frequency.value=f;o.type=t;g.gain.setValueAtTime(v,ax.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ax.currentTime+d);o.start();o.stop(ax.currentTime+d)}catch(e){}
}
function pc(){pt(900,0.06)}
function psu(){if(!se)return;try{ia();[660,880,1100].forEach((f,i)=>{const o=ax.createOscillator(),g=ax.createGain();o.connect(g);g.connect(ax.destination);o.frequency.value=f;const t=ax.currentTime+i*0.12;g.gain.setValueAtTime(VOL*0.8,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.2)})}catch(e){}}
function per(){if(!se)return;try{ia();const o=ax.createOscillator(),g=ax.createGain();o.connect(g);g.connect(ax.destination);o.frequency.setValueAtTime(400,ax.currentTime);o.frequency.exponentialRampToValueAtTime(200,ax.currentTime+0.2);o.type='sawtooth';g.gain.setValueAtTime(VOL*0.4,ax.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ax.currentTime+0.25);o.start();o.stop(ax.currentTime+0.25)}catch(e){}}
function ts(){se=!se;document.getElementById('st').textContent=se?'🔊':'🔇';if(se){ia();pc()}}
window.addEventListener('load',()=>{setTimeout(()=>{document.getElementById('loader').classList.add('hide')},2500)})

const grid = document.getElementById('products');
PRODS.forEach(p=>{
  grid.innerHTML += `<div class="pc">
    <div class="pi" style="border-color:${p.color}22">${p.icon}</div>
    <div class="pn">${p.name}</div>
    <div class="pd">${p.desc}</div>
    <div class="pf">
      <div class="pp">${p.price} <span>Flous</span></div>
      <button class="ad-btn" onclick="add(${p.id})">شراء</button>
    </div>
  </div>`;
});

function add(id){pc();const p=PRODS.find(x=>x.id===id);const c=cart.find(x=>x.id===id);if(c){c.qty++}else{cart.push({...p,qty:1})}uc()}
function oc(){pc();document.getElementById('drw').classList.add('open')}
function cc(){pc();document.getElementById('drw').classList.remove('open')}
function cq(id,d){pc();const i=cart.find(x=>x.id===id);if(!i)return;i.qty+=d;if(i.qty<=0)cart=cart.filter(x=>x.id!==id);uc()}
function uc(){
  const l=document.getElementById('ditems'),te=document.getElementById('total'),ce=document.getElementById('cartC');
  l.innerHTML='';let t=0,c=0;
  cart.forEach(it=>{t+=it.price*it.qty;c+=it.qty;l.innerHTML+=`<div class="dit"><div class="di">${it.icon}</div><div class="dinf"><div class="dn">${it.name}</div><div class="dp">${it.price*it.qty} Flous</div></div><div class="dct"><button onclick="cq(${it.id},-1)">-</button><span>${it.qty}</span><button onclick="cq(${it.id},1)">+</button></div></div>`});
  te.textContent=`${t} Flous`;ce.textContent=c;
}
function ocm(){pc();if(!cart.length){per();return}document.getElementById('mo').classList.add('open')}
function cm(){pc();document.getElementById('mo').classList.remove('open')}
function so(){
  pc();const n=document.getElementById('fName'),d=document.getElementById('fDisc'),pay=document.getElementById('fPay');
  n.classList.remove('err');d.classList.remove('err');
  const nv=n.value.trim(),dv=d.value.trim();
  if(!nv){n.classList.add('err');per();return}
  if(!dv){d.classList.add('err');per();return}
  const btn=document.getElementById('coBtn');btn.disabled=true;btn.innerHTML='جاري الإرسال...';
  let items='',tot=0;
  cart.forEach(it=>{items+=`• ${it.name} x${it.qty} = ${it.price*it.qty} Flous\n`;tot+=it.price*it.qty});
  const emb={embeds:[{
    title:'🛒 طلب شراء جديد',
    color:15844367,
    fields:[
      {name:'👤 المشتري',value:nv},
      {name:'💬 الديسكورد',value:dv},
      {name:'💳 الدفع',value:pay.value},
      {name:'📦 المنتجات',value:items||'لا يوجد'},
      {name:'💰 الإجمالي',value:`${tot} Flous`},
      {name:'🕒 الوقت',value:new Date().toLocaleString('ar-SA')}
    ],
    footer:{text:'GROW YMAK | المتجر الرسمي'}
  }]};
  fetch(WH,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(emb)})
  .then(()=>fo()).catch(()=>fo())
}
function fo(){
  cart=[];uc();psu();
  document.getElementById('mm').innerHTML=`
    <div class="suc">✓</div>
    <div class="mt">تم تقديم الطلب بنجاح!</div>
    <p style="text-align:center;color:var(--muted);line-height:1.7;margin-bottom:30px">تم إرسال طلبك للإدارة. سيتم التواصل معك قريباً لتسليم المشتريات.</p>
    <a href="${INV}" target="_blank" class="chk-btn" style="display:block;text-align:center;text-decoration:none">الانضمام إلى السيرفر</a>`;
}
</script>
</body>
</html>
